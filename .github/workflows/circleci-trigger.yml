name: Trigger CircleCI Pipeline

on:
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main

jobs:
  trigger-circleci:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CircleCI Pipeline
        env:
          CIRCLE_TOKEN: ${{ secrets.CIRCLE_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          curl -X POST https://circleci.com/api/v2/project/circleci/QWN8vX21fhdBu8kACa4z5w/3uQARv8g1rHVnDEy5ezCSR/pipeline/run \
          --header "Circle-Token: $CIRCLE_TOKEN" \
          --header "content-type: application/json" \
          --data '{
            "definition_id": "494369bd-56eb-414b-9989-d202a267c12f",
            "checkout": {"branch": "'"$BRANCH_NAME"'"}
          }'
